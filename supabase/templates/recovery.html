<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your Mayantha Portfolio password</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 32px 16px;
      background: #f5f5f7;
      color: #202126;
      font-family: Arial, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="max-width: 560px; margin: 0 auto; background: #ffffff; border-radius: 16px"
    >
      <tr>
        <td style="padding: 36px">
          <p
            style="
              margin: 0 0 12px;
              color: #6b7280;
              font-size: 12px;
              letter-spacing: 1.5px;
              text-transform: uppercase;
            "
          >
            Mayantha Portfolio
          </p>
          <h1 style="margin: 0 0 16px; font-size: 26px">Reset your password</h1>
          <p style="margin: 0 0 24px; color: #4b5563; line-height: 1.6">
            A password reset was requested for the portfolio administrator account.
          </p>
          <a
            href="https://mayantha.dev/auth?recovery=1&amp;token_hash={{ .TokenHash }}&amp;type=recovery"
            style="
              display: inline-block;
              padding: 12px 20px;
              border-radius: 10px;
              background: #202126;
              color: #ffffff;
              font-weight: 700;
              text-decoration: none;
            "
          >
            Reset password
          </a>
          <p style="margin: 24px 0 0; color: #6b7280; font-size: 13px; line-height: 1.5">
            If you did not request this, you can safely ignore this email.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
